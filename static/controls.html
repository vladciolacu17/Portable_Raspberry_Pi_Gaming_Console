<!DOCTYPE html>
<html>
<head>
  <title>Player 2 Controls</title>
</head>
<body>
  <h2>Player 2</h2>

  <!-- Live game image -->
  <img id="gameview" width="640"><br><br>

  <!-- Control buttons -->
  <button onclick="sendDir('UP')">UP</button><br>
  <button onclick="sendDir('LEFT')">LEFT</button>
  <button onclick="sendDir('RIGHT')">RIGHT</button><br>
  <button onclick="sendDir('DOWN')">DOWN</button>

  <script>
    // Send direction to Flask server
    function sendDir(dir) {
      fetch('/set_dir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ dir: dir })
      });
    }

    // Arrow key support
    document.addEventListener('keydown', (event) => {
      switch (event.key) {
        case 'ArrowUp': sendDir('UP'); break;
        case 'ArrowDown': sendDir('DOWN'); break;
        case 'ArrowLeft': sendDir('LEFT'); break;
        case 'ArrowRight': sendDir('RIGHT'); break;
      }
    });

    // Refresh game view every 100ms
    setInterval(() => {
      const img = document.getElementById('gameview');
      img.src = '/stream?' + new Date().getTime(); // cache buster
    }, 100);
  </script>
</body>
</html>
